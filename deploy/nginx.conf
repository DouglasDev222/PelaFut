server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA — todo caminho desconhecido cai no index.html (React Router client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome podem ter cache longo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
