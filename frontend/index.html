<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e11" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Organize a pelada: times, rodízio da fila e estatísticas ao vivo." />
    <title>PelaFut</title>
    <!--
      The app is dark-only. Painting the dark surface here (and declaring the
      color scheme) keeps the install splash and the first frame from flashing
      white before the CSS bundle lands.
    -->
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body,
      #root {
        background-color: #0b0e11;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
